<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>KingGoal - Modo Noturno</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="logo">
    <h1><span class="dourado">KG</span> - KingGoal</h1>
  </div>
  <div id="menu-principal">
    <button onclick="mostrarModoTreinamento()">Entrar no Modo Treinamento</button>
    <button onclick="mostrarJogosReais()">Ver Jogos Reais</button>
  </div>

  <div id="modo-treinamento" style="display:none;">
    <h2>Modo Treinamento</h2>
    <label for="banca">Banca simulada (R$):</label>
    <input type="number" id="banca" value="100" oninput="sugerirStake()" />
    <div id="sugestao"></div>
    <div id="jogos-treinamento"></div>
  </div>

  <div id="jogos-reais" style="display:none;">
    <h2>Jogos Reais (Simulados)</h2>
    <div id="jogos"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
