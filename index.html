<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>KingGoal - IA Estratégica</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="logo">
    <h1><span style="color:#d4af37;">KG</span> - KingGoal</h1>
  </div>
  <div id="login">
    <input type="email" placeholder="E-mail" id="email">
    <input type="password" placeholder="Senha" id="senha">
    <button onclick="entrar()">Entrar</button>
  </div>
  <div id="app" style="display:none;">
    <h2>Jogos do Dia</h2>
    <div id="jogos"></div>
    <h3>Modo Treinamento</h3>
    <label for="banca">Banca simulada (R$):</label>
    <input type="number" id="banca" value="100" oninput="sugerirStake()" />
    <div id="sugestao"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
