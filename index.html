<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>KingGoal - MVP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>KingGoal ⚽👑</h1>
    <div id="login">
        <input type="email" placeholder="Seu e-mail" id="email">
        <input type="password" placeholder="Sua senha" id="senha">
        <button onclick="entrar()">Entrar</button>
    </div>
    <div id="app" style="display:none;">
        <h2>Jogos do dia</h2>
        <div id="jogos"></div>
        <h3>Modo Treinamento</h3>
        <label for="banca">Minha banca simulada (R$):</label>
        <input type="number" id="banca" value="100" />
    </div>
    <script src="script.js"></script>
</body>
</html>
